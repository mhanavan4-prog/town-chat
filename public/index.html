<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Town Chat</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width:100%; height:100%; overflow:hidden;
    background:#1a2e1f; font-family:'Segoe UI', Arial, sans-serif;
    -webkit-user-select:none; user-select:none;
  }
  canvas { display:block; touch-action:none; }

  .overlay {
    position:fixed; inset:0; z-index:20;
    display:flex; align-items:center; justify-content:center;
    background:rgba(10,16,12,0.82); backdrop-filter:blur(3px);
  }
  .hidden { display:none !important; }

  .card {
    width:min(380px, 88vw); text-align:center;
    padding:32px 26px; border-radius:16px;
    background:linear-gradient(160deg, rgba(28,40,30,0.97), rgba(16,24,18,0.97));
    border:1px solid rgba(160,220,160,0.18);
    box-shadow:0 0 50px rgba(120,200,120,0.1), 0 10px 40px rgba(0,0,0,0.5);
  }
  .title {
    font-size:28px; font-weight:800; margin-bottom:6px;
    background:linear-gradient(90deg,#9ee37d,#5ee7c0,#7ad9ff);
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .subtitle { color:#9bc49a; font-size:12.5px; margin-bottom:20px; line-height:1.5; }
  input[type=text], input[type=password] {
    width:100%; padding:11px 14px; margin-bottom:12px; font-size:14px;
    border-radius:8px; border:1px solid rgba(160,220,160,0.25);
    background:rgba(0,0,0,0.25); color:#eafff0; outline:none;
  }
  input::placeholder { color:#6f8f6f; }
  .btn {
    width:100%; padding:12px; font-size:15px; font-weight:700;
    color:#08130a; border:none; border-radius:10px; cursor:pointer;
    background:linear-gradient(90deg,#9ee37d,#5ee7c0);
    margin-top:4px; transition:transform .12s ease;
  }
  .btn:hover { transform:translateY(-1px); }
  .err { color:#ff9b9b; font-size:12.5px; margin-top:8px; min-height:14px; }

  #hud {
    position:fixed; top:0; left:0; right:0; z-index:5;
    display:flex; justify-content:space-between; padding:14px 18px;
    pointer-events:none;
  }
  #roomTag {
    pointer-events:auto;
    background:rgba(10,16,12,0.6); border:1px solid rgba(160,220,160,0.2);
    color:#eafff0; font-size:13px; font-weight:700; padding:8px 16px;
    border-radius:20px; backdrop-filter:blur(4px);
  }
  #statusDot {
    width:9px; height:9px; border-radius:50%; background:#5ee37d;
    display:inline-block; margin-right:6px; box-shadow:0 0 6px #5ee37d;
  }
  #peopleTag {
    pointer-events:auto;
    background:rgba(10,16,12,0.6); border:1px solid rgba(160,220,160,0.2);
    color:#cfe9cf; font-size:12px; padding:8px 14px; border-radius:20px;
    display:flex; align-items:center; gap:10px;
  }
  #muteBtn {
    pointer-events:auto;
    background:none; border:none; color:#cfe9cf; font-size:14px;
    cursor:pointer; line-height:1; padding:0;
  }

  #chatPanel {
    position:fixed; left:16px; top:112px; z-index:6;
    width:360px; max-width:70vw;
    display:flex; flex-direction:column;
    pointer-events:none;
    background:linear-gradient(160deg, rgba(28,20,14,0.88), rgba(16,12,8,0.92));
    border:2px solid rgba(217,138,79,0.45);
    border-radius:16px;
    padding:10px 12px 12px;
    box-shadow:0 0 40px rgba(0,0,0,0.4), 0 8px 30px rgba(0,0,0,0.5);
  }
  #chatHeader {
    pointer-events:none;
    color:#ffd9a0; font-size:13px; font-weight:700;
    margin-bottom:8px; padding-bottom:6px;
    border-bottom:1px solid rgba(217,138,79,0.3);
  }
  #chatLog {
    pointer-events:auto;
    max-height:260px; min-height:90px; overflow-y:auto; margin-bottom:8px;
    display:flex; flex-direction:column; gap:5px;
  }
  .chatLine {
    background:rgba(0,0,0,0.28); border-radius:8px; padding:7px 11px;
    font-size:13px; color:#eafff0; line-height:1.35; backdrop-filter:blur(3px);
    animation:fadeIn .15s ease;
  }
  .chatLine b { margin-right:4px; }
  @keyframes fadeIn { from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:translateY(0);} }
  #chatInputRow { pointer-events:auto; display:flex; gap:6px; }
  #chatInput {
    flex:1; padding:11px 14px; border-radius:20px; border:1px solid rgba(217,138,79,0.35);
    background:rgba(0,0,0,0.35); color:#eafff0; font-size:13.5px; outline:none;
  }
  #chatInput::placeholder { color:#8a7560; }

  #interactHint {
    position:fixed; left:50%; bottom:96px; z-index:6;
    transform:translateX(-50%);
    pointer-events:none;
  }
  #interactHint.hidden { display:none !important; }
  #interactHint span {
    background:rgba(20,10,8,0.78); border:1px solid rgba(230,190,120,0.4);
    color:#ffe9c2; font-size:13px; font-weight:600; padding:8px 18px;
    border-radius:18px; backdrop-filter:blur(4px);
  }

  .nameTag {
    position:absolute; pointer-events:none; transform:translate(-50%,-100%);
    color:#fff; font-size:12px; font-weight:700; text-align:center;
    text-shadow:0 1px 3px rgba(0,0,0,0.8), 0 0 6px rgba(0,0,0,0.5);
    white-space:nowrap; z-index:7;
  }

  #unlockBar {
    position:fixed; top:64px; left:0; right:0; z-index:6;
    display:flex; justify-content:center; pointer-events:none;
  }
  #unlockBar.hidden { display:none !important; }
  #unlockInner {
    pointer-events:auto;
    display:flex; align-items:center; gap:10px;
    background:rgba(20,10,8,0.72); border:1px solid rgba(230,190,120,0.35);
    color:#ffe9c2; font-size:12.5px; padding:8px 10px 8px 16px;
    border-radius:20px; backdrop-filter:blur(4px);
  }
  #unlockBtn {
    border:none; border-radius:16px; padding:7px 14px; font-size:12.5px; font-weight:700;
    color:#2a1605; cursor:pointer;
    background:linear-gradient(90deg,#ffd27a,#ff9d5c);
  }
  #unlockToast {
    position:fixed; top:104px; left:0; right:0; z-index:6;
    display:flex; justify-content:center; pointer-events:none;
  }
  #unlockToast.hidden { display:none !important; }
  #unlockToast span {
    background:rgba(20,10,8,0.82); border:1px solid rgba(230,190,120,0.35);
    color:#ffe9c2; font-size:12.5px; padding:7px 16px; border-radius:16px;
  }

  #joystick {
    position:fixed; bottom:90px; right:30px; z-index:6;
    width:110px; height:110px; border-radius:50%;
    background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.18);
    display:none;
  }
  #joystick.show { display:block; }
  #stick {
    position:absolute; width:46px; height:46px; border-radius:50%;
    background:rgba(255,255,255,0.35); top:32px; left:32px;
  }
</style>
</head>
<body>

<canvas id="game"></canvas>

<div id="hud" class="hidden">
  <div id="roomTag"><span id="statusDot"></span><span id="roomLabel">Town Square</span></div>
  <div id="peopleTag">
    <span><span id="peopleCount">1</span> in town</span>
    <button id="muteBtn" title="Mute music">🔈</button>
  </div>
</div>

<div id="unlockBar" class="hidden">
  <div id="unlockInner">
    🔒 Premium buildings need a Town Pass
    <button id="unlockBtn">🔓 Unlock all — <span id="unlockPrice">$3.00</span></button>
  </div>
</div>
<div id="unlockToast" class="hidden"><span id="unlockToastText"></span></div>

<div id="chatPanel" class="hidden">
  <div id="chatHeader">💬 Town Square</div>
  <div id="chatLog"></div>
  <div id="chatInputRow">
    <input id="chatInput" type="text" placeholder="Say something… (Enter to send)" maxlength="240">
  </div>
</div>

<div id="interactHint" class="hidden"><span id="interactHintText">Press E to sit</span></div>

<div id="joystick"><div id="stick"></div></div>

<div id="joinScreen" class="overlay">
  <div class="card">
    <div class="title">TOWN CHAT</div>
    <div class="subtitle">Wander the town with friends. Walk into a building for a full medieval interior and its private chat — The Cafe is free, the rest need a Town Pass.</div>
    <input id="nameInput" type="text" placeholder="Your name" maxlength="18" autocomplete="off">
    <input id="passInput" type="password" placeholder="Passcode (if your town has one)" autocomplete="off">
    <button class="btn" id="joinBtn">ENTER TOWN</button>
    <div class="err" id="joinErr"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="client.js"></script>
</body>
</html>
